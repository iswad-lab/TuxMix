<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#0d0d0d"/>
  <rect x="8" y="8" width="112" height="112" rx="18" fill="#18181a" stroke="#2a2a30" stroke-width="2"/>

  <!-- Three fader rails, evoking a channel strip -->
  <g stroke="#2a2a30" stroke-width="6" stroke-linecap="round">
    <line x1="40" y1="28" x2="40" y2="100"/>
    <line x1="64" y1="28" x2="64" y2="100"/>
    <line x1="88" y1="28" x2="88" y2="100"/>
  </g>

  <!-- Fill up to each cap, like an active fader -->
  <g stroke="#4fc3f7" stroke-width="6" stroke-linecap="round">
    <line x1="40" y1="58" x2="40" y2="100"/>
    <line x1="64" y1="40" x2="64" y2="100"/>
    <line x1="88" y1="70" x2="88" y2="100"/>
  </g>

  <!-- Caps -->
  <g fill="#e8e8ec">
    <rect x="30" y="52" width="20" height="10" rx="3"/>
    <rect x="54" y="34" width="20" height="10" rx="3"/>
    <rect x="78" y="64" width="20" height="10" rx="3"/>
  </g>
</svg>
